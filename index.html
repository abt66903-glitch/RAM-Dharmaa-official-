<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAM MASTER CONTROL | KANPUR 🚩</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ff9933; --neon: #14F195; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; text-align: center; }
        .container { background: #151515; border: 1px solid var(--gold); padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .product-card { background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; position: relative; }
        .prod-img { width: 100%; height: 90px; border-radius: 8px; object-fit: cover; background: #333; }
        .price { color: var(--neon); font-size: 14px; font-weight: bold; margin: 5px 0; }
        .btn { width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; font-size: 12px; }
        .btn-buy { background: var(--gold); color: #000; }
        input { width: 85%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; }
        #adminPage, #shopPage, #cartPage { display: none; }
        .admin-btn { position: fixed; bottom: 10px; right: 10px; background: rgba(255,153,51,0.2); color: #555; border: none; font-size: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/abt66903-glitch/RAM-Dharmaa-official-/main/1000014690.png" style="width:70px; border-radius:50%; border:2px solid var(--gold); margin:10px;">

    <div id="regPage" class="container">
        <h2 style="color:var(--gold);">RAM DIGITAL MALL</h2>
        <input type="text" id="regName" placeholder="अपना नाम">
        <button class="btn btn-buy" onclick="enterMall()">SHOP NOW</button>
    </div>

    <div id="shopPage" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <p style="color:var(--gold); font-size:12px;">Welcome, <span id="uName"></span></p>
            <button onclick="showCart()" style="background:none; border:none; color:var(--neon); cursor:pointer;">🛒 Cart (<span id="cartCount">0</span>)</button>
        </div>
        <div id="productGrid" class="shop-grid"></div>
    </div>

    <div id="adminPage" class="container">
        <h2 style="color:var(--neon);">ADMIN CONTROL</h2>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="number" id="pPrice" placeholder="New Price (कम रखें)">
        <input type="text" id="pImg" placeholder="Image URL">
        <button class="btn btn-buy" onclick="addProduct()">UPDATE PRODUCT</button>
        <button class="btn" style="background:red; color:white; margin-top:10px;" onclick="location.reload()">CLOSE ADMIN</button>
    </div>

    <div id="cartPage" class="container">
        <h2 style="color:var(--gold);">Your Bill</h2>
        <div id="billItems" style="text-align:left;"></div>
        <h3 id="totalPrice" style="color:var(--neon);"></h3>
        <div style="background:#fff; padding:10px; border-radius:15px; margin:15px 0;">
            <img id="upiQR" src="" style="width:130px;">
        </div>
        <button class="btn btn-buy" onclick="confirmOrder()">CONFIRM ORDER</button>
        <button class="btn" style="background:#333; color:#fff; margin-top:5px;" onclick="backToShop()">BACK</button>
    </div>

    <button class="admin-btn" onclick="openAdmin()">Master Login</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUHVzbzmx0nPED192iIYw0Pfh5EdtmnA0",
            authDomain: "ramcoin-c7b77.firebaseapp.com",
            projectId: "ramcoin-c7b77",
            databaseURL: "https://ramcoin-c7b77-default-rtdb.firebaseio.com/",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let cart = []; let userName = "";

        // --- Load Products from Firebase ---
        function loadProducts() {
            database.ref('ram_products').on('value', (snap) => {
                const data = snap.val();
                const grid = document.getElementById('productGrid');
                grid.innerHTML = "";
                for(let id in data) {
                    let p = data[id];
                    grid.innerHTML += `<div class="product-card">
                        <img src="${p.img}" class="prod-img">
                        <p style="font-size:10px; margin:5px 0;">${p.name}</p>
                        <div class="price">₹${p.price}</div>
                        <button class="btn btn-buy" onclick="addToCart('${p.name}', ${p.price})">ADD</button>
                    </div>`;
                }
            });
        }

        function enterMall() {
            userName = document.getElementById('regName').value;
            if(!userName) return alert("नाम भरें!");
            document.getElementById('regPage').style.display='none';
            document.getElementById('shopPage').style.display='block';
            document.getElementById('uName').innerText = userName;
            loadProducts();
        }

        function addToCart(n, p) { cart.push({n,p}); document.getElementById('cartCount').innerText = cart.length; }

        function showCart() {
            document.getElementById('shopPage').style.display='none';
            document.getElementById('cartPage').style.display='block';
            let b = ""; let t = 0;
            cart.forEach(i => { b += `<div style="display:flex; justify-content:space-between; font-size:12px; padding:5px; border-bottom:1px solid #333;"><span>${i.n}</span><span>₹${i.p}</span></div>`; t += i.p; });
            document.getElementById('billItems').innerHTML = b;
            document.getElementById('totalPrice').innerText = "Total: ₹" + t;
            document.getElementById('upiQR').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=6393339842@kotak811&pn=ABHISHEK&am=${t}&cu=INR`;
        }

        function backToShop() { document.getElementById('cartPage').style.display='none'; document.getElementById('shopPage').style.display='block'; }

        // --- Master Admin Functions ---
        function openAdmin() {
            let pass = prompt("कानपुर मुख्यालय का पासवर्ड डालें:");
            if(pass === "RAM786") {
                document.getElementById('regPage').style.display='none';
                document.getElementById('shopPage').style.display='none';
                document.getElementById('adminPage').style.display='block';
            } else { alert("गलत पासवर्ड!"); }
        }

        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = parseInt(document.getElementById('pPrice').value);
            const img = document.getElementById('pImg').value;
            if(!name || !price || !img) return alert("सब भरें!");
            
            database.ref('ram_products/' + name).set({ name, price, img })
            .then(() => alert("Product Updated at Low Price!"));
        }

        function confirmOrder() {
            database.ref('ram_orders/' + Date.now()).set({ customer: userName, items: cart, time: new Date().toLocaleString() })
            .then(() => { alert("Order Confirmed!"); location.reload(); });
        }
    </script>
</body>
</html>
