<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>धर्मा सोशल - रामधन ऑफिशियल</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        textarea { width: 90%; height: 80px; margin-bottom: 10px; border-radius: 5px; padding: 10px; border: 1px solid #ccc; }
        button { background-color: #1877f2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #posts { margin-top: 20px; text-align: left; }
        .post-box { background: #fff; padding: 10px; border-bottom: 1px solid #ddd; margin-bottom: 10px; border-radius: 5px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
    <h2>🚩 धर्मा सोशल 🚩</h2>
    <textarea id="postInput" placeholder="राम-राम भाई! आज क्या विचार हैं?"></textarea><br>
    <button onclick="sendPost()">Post करें</button>

    <div id="posts"></div>
</div>

<script>
  // अभिषेक भाई, ये आपका असली Config कोड है
  const firebaseConfig = {
    apiKey: "AIzaSyBUHVzbzwx0nPED192IIYw0...", 
    authDomain: "ramcoin-c7b77.firebaseapp.com",
    databaseURL: "https://ramcoin-c7b77-default-rtdb.firebaseio.com",
    projectId: "ramcoin-c7b77",
    storageBucket: "ramcoin-c7b77.appspot.com",
    messagingSenderId: "194837969479",
    appId: "1:194837969479:web:37bbcf9ffe3396b69d8f62"
  };

  // Firebase चालू करें
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // पोस्ट भेजने का फंक्शन
  function sendPost() {
    const postText = document.getElementById('postInput').value;
    if(postText.trim() !== "") {
      database.ref('all_posts').push({
        text: postText,
        user: "रामधन ऑफिशियल",
        time: new Date().toLocaleString()
      });
      document.getElementById('postInput').value = "";
      alert("पोस्ट हो गया भाई!");
    }
  }

  // पुरानी पोस्ट दिखाने का फंक्शन
  database.ref('all_posts').on('value', (snapshot) => {
    const postsDiv = document.getElementById('posts');
    postsDiv.innerHTML = "<h3>ताज़ा पोस्ट:</h3>";
    snapshot.forEach((childSnapshot) => {
      const data = childSnapshot.val();
      postsDiv.innerHTML += `<div class="post-box"><b>${data.user}:</b> <p>${data.text}</p><small>${data.time}</small></div>`;
    });
  });
</script>

</body>
</html>
