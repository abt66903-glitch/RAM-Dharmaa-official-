<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAM DHARMAA OFFICIAL</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .fort-container { width: 90%; max-width: 400px; background: #1b2631; border: 3px solid #FFD700; border-radius: 25px; padding: 20px; text-align: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
        .shahi-title { color: #FFD700; font-size: 22px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .sub-text { font-size: 14px; color: #81d4fa; margin-bottom: 20px; }
        
        /* 3D Coin Cycle Animation */
        .coin-box { perspective: 1000px; margin: 30px 0; }
        .vantri-coin { width: 160px; height: 160px; margin: 0 auto; position: relative; transform-style: preserve-3d; animation: rotateCycle 7s linear infinite; }
        .face { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; border: 4px solid #FFD700; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .front { background: radial-gradient(circle, #fbc02d, #f57f17); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #1b2631; font-size: 20px; }
        .back { background: conic-gradient(red, orange, yellow, green, blue, indigo, violet, red); transform: rotateY(180deg); }
        
        @keyframes rotateCycle { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        
        .social-icons { display: flex; justify-content: space-around; margin-top: 25px; border-top: 1px solid rgba(255,215,0,0.2); padding-top: 20px; }
        .icon-link { text-decoration: none; color: #FFD700; font-size: 12px; font-weight: bold; }
        .icon-link img { width: 40px; display: block; margin: 0 auto 5px; }
    </style>
</head>
<body>

<div class="fort-container">
    <div class="shahi-title">RAM DHARMAA</div>
    <div class="sub-text">OFFICIAL • 1985 • KANPUR</div>

    <div class="coin-box">
        <div class="vantri-coin">
            <div class="face front">RAMC</div>
            <div class="face back"></div>
        
    

    <div class="social-icons">
        <a href="https://t.me/abt66903" class="icon-link">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">TELEGRAM
        </a>
        <a href="https://twitter.com/abt66903" class="icon-link">
            <img src="https://cdn-icons-png.flaticon.com/512/5969/5969020.png" alt="X">TWITTER
        </a>
    </div>

    <p style="font-size: 10px; margin-top: 20px; opacity: 0.5;">🔒 GOOGLE 2FA PROTECTED</p>
</div>

</body>
</html>
