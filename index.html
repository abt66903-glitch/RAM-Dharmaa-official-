
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYASI GLOBAL - 786.214.1000</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ff9933; --neon: #14F195; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: #151515; border: 2px solid var(--gold); padding: 25px; border-radius: 20px; margin: 20px auto; max-width: 450px; box-shadow: 0 0 20px rgba(255,153,51,0.2); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-buy { background: linear-gradient(45deg, var(--gold), #ffcc33); color: #000; }
        .btn-wallet { background: #fff; color: #000; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--gold); background: #222; color: #fff; text-align: center; }
        .qr-box { background: #fff; padding: 10px; border-radius: 10px; width: 150px; margin: 15px auto; }
        #adminList { text-align: left; font-size: 12px; background: #000; padding: 10px; border-radius: 10px; margin-top: 20px; display: none; border: 1px dashed var(--neon); }
    </style>
</head>
<body>

    <h1 style="color:var(--gold); font-size: 40px; margin-bottom: 5px;">PYASI GLOBAL 🚩</h1>
    <p style="margin-top: 0;">786 . 214 . 1000 | कानपुर मुख्यालय</p>

    <div class="card">
        <h3 style="color: var(--neon);">🪙 Buy & Save PYC</h3>
        <input type="number" id="solAmount" placeholder="कितने SOL का खरीदना है?">
        <button class="btn btn-buy" onclick="handlePurchase()">BUY & REGISTER</button>
        <p id="status" style="font-size: 12px; margin-top: 10px;"></p>
    </div>

    <div class="card">
        <h3>💰 Direct UPI Payment</h3>
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=9839XXXXXX@ybl&pn=ABHISHEK&am=0" style="width:100%">
        </div>
        <p style="font-size: 12px;">Scan and Pay via PhonePe / GooglePay</p>
    </div>

    <button onclick="toggleAdmin()" style="background:none; border:none; color:#333; cursor:pointer;">Admin Login</button>
    <div id="adminList">
        <h4 style="color:var(--neon);">All Transactions:</h4>
        <div id="records"></div>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyBUHVzbzmx0nPED192iIYw0Pfh5EdtmnA0",
            authDomain: "ramcoin-c7b77.firebaseapp.com",
            projectId: "ramcoin-c7b77",
            storageBucket: "ramcoin-c7b77.firebasestorage.app",
            databaseURL: "https://ramcoin-c7b77-default-rtdb.firebaseio.com/",
            messagingSenderId: "194837969479",
            appId: "1:194837969479:web:37bbcf9ffe3396b59d8f62"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- Purchase Logic ---
        async function handlePurchase() {
            const amount = document.getElementById('solAmount').value;
            const status = document.getElementById('status');
            
            if(!amount || amount <= 0) { alert("सही मात्रा डालें!"); return; }

            try {
                // 1. Connect Solana Wallet
                const resp = await window.solana.connect();
                const wallet = resp.publicKey.toString();
                status.innerText = "Wallet Connected! Saving record...";

                // 2. Save to Firebase
                const txId = "TXN" + Date.now();
                await database.ref('sales/' + txId).set({
                    wallet: wallet,
                    amount_sol: amount,
                    pyc_allotted: amount * 1000000,
                    timestamp: new Date().toLocaleString()
                });

                status.innerText = "✅ Success! " + amount + " SOL record saved for " + wallet.substring(0,6) + "...";
                alert("बधाई! आपका ट्रांजैक्शन डेटाबेस में सुरक्षित हो गया है।");
                loadRecords(); // Refresh list
            } catch (err) {
                status.innerText = "❌ Error: Wallet not found or rejected.";
            }
        }

        // --- Admin Functions ---
        function toggleAdmin() {
            const list = document.getElementById('adminList');
            list.style.display = list.style.display === 'none' ? 'block' : 'none';
            loadRecords();
        }

        function loadRecords() {
            database.ref('sales/').on('value', (snapshot) => {
                const data = snapshot.val();
                let html = "";
                for(let id in data) {
                    html += `<p style='border-bottom:1px solid #222'>${data[id].timestamp} | ${data[id].wallet.substring(0,5)} | ${data[id].amount_sol} SOL</p>`;
                }
                document.getElementById('records').innerHTML = html || "No records yet.";
            });
        }
    </script>
</body>
</html>
