<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ram DHARMaaa Official</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #111;
            color: white;
        }

        /* बैकग्राउंड कवर (Back Cover) */
        .cover-photo {
            width: 100%;
            height: 250px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); /* यहाँ अपनी पसंद का कवर लिंक डालें */
            background-size: cover;
            background-position: center;
            border-bottom: 4px solid #ff4b2b;
        }

        /* प्रोफाइल इमेज (Main Image) */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -75px; /* इमेज को कवर के ऊपर चढ़ाने के लिए */
        }

        .main-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #111;
            background: url('https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80'); /* यहाँ अपनी फोटो का लिंक डालें */
            background-size: cover;
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.5);
        }

        .content {
            text-align: center;
            padding: 20px;
        }

        .identity {
            color: #ff4b2b;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        h1 {
            margin: 10px 0;
            font-size: 2rem;
            text-shadow: 2px 2px 4px #000;
        }

        .tagline {
            color: #888;
            font-style: italic;
        }

        .card {
            background: #222;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            max-width: 600px;
            border-radius: 10px;
            border-left: 5px solid #ff4b2b;
        }
    </style>
</head>
<body>

    <div class="cover-photo"></div>

    <div class="profile-section">
        <div class="main-image"></div>
    </div>

    <div class="content">
        <p class="identity">786.214.1000*1008.16</p>
        <h1>Ram DHARMaaa Official</h1>
        <p class="tagline">The Real Web World</p>

        <div class="card">
            <h3>स्वागत है, अभिषेक भाई!</h3>
            <p>Firebase हट गया है। अब आपकी वेबसाइट का डिज़ाइन और इमेज ही इसकी असली ताकत हैं।</p>
        </div>
    </div>

</body>
</html>
