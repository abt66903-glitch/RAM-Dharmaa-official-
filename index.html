<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYASI GLOBAL 🚩</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ff9933; --neon: #14F195; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; border: 2px solid var(--gold); padding: 25px; border-radius: 20px; margin: 20px auto; max-width: 450px; box-shadow: 0 0 20px rgba(255,153,51,0.2); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-reg { background: var(--gold); color: #000; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--gold); background: #222; color: #fff; text-align: center; font-size: 16px; }
        .qr-box { background: #fff; padding: 15px; border-radius: 15px; width: 180px; margin: 15px auto; }
        #status { font-size: 13px; color: var(--neon); margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="color:var(--gold); font-size: 40px; margin-bottom: 5px;">PYASI GLOBAL 🚩</h1>
    <p style="margin-top: 0; letter-spacing: 2px;">786 . 214 . 1000 | कानपुर मुख्यालय</p>

    <div class="card">
        <h3 style="color: var(--neon);">🆓 FREE REGISTRATION</h3>
        <p style="font-size: 12px; color: #aaa;">सिक्कों के लिए अपना नाम और पता दर्ज करें</p>
        
        <input type="text" id="userName" placeholder="अपना पूरा नाम लिखें">
        <input type="text" id="userContact" placeholder="मोबाइल नंबर या वॉलेट एड्रेस">
        
        <button class="btn btn-reg" onclick="freeRegister()">REGISTER NOW</button>
        <p id="status"></p>
    </div>

    <div class="card">
        <h3>💰 Support the Mission (UPI)</h3>
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=upi://pay?pa=6393339842@kotak811&pn=ABHISHEK&am=0&cu=INR" style="width:100%">
        </div>
        <p style="font-size: 12px;">6393339842@kotak811</p>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBUHVzbzmx0nPED192iIYw0Pfh5EdtmnA0",
            authDomain: "ramcoin-c7b77.firebaseapp.com",
            projectId: "ramcoin-c7b77",
            storageBucket: "ramcoin-c7b77.firebasestorage.app",
            databaseURL: "https://ramcoin-c7b77-default-rtdb.firebaseio.com/",
            messagingSenderId: "194837969479",
            appId: "1:194837969479:web:37bbcf9ffe3396b59d8f62"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function freeRegister() {
            const name = document.getElementById('userName').value;
            const contact = document.getElementById('userContact').value;
            const status = document.getElementById('status');

            if(!name || !contact) {
                alert("कृपया नाम और मोबाइल नंबर दोनों भरें!");
                return;
            }

            status.innerText = "रजिस्टर हो रहा है...";

            // सीधे Firebase में डेटा भेजना (बिना किसी वॉलेट फीस के)
            const regId = "FREE-" + Date.now();
            database.ref('free_registrations/' + regId).set({
                full_name: name,
                contact_info: contact,
                time: new Date().toLocaleString(),
                type: "Free Member"
            }).then(() => {
                status.innerText = "✅ बधाई! आप फ्री में रजिस्टर हो गए हैं।";
                alert("शुक्रिया " + name + "! आपका डेटा कानपुर मुख्यालय में सुरक्षित है।");
                document.getElementById('userName').value = "";
                document.getElementById('userContact').value = "";
            }).catch((error) => {
                status.innerText = "❌ एरर: " + error.message;
            });
        }
    </script>
</body>
</html>
